services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # SQLite persisted in a volume; override with postgres profile below if desired
      DATABASE_URL: sqlite:////app/data/support_agents.db
      # From inside the container, Ollama runs on the host
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Optional: run with `docker compose --profile postgres up`
  # and set DATABASE_URL=postgresql+psycopg2://callforge:callforge@postgres:5432/callforge
  # (requires installing the package with the [postgres] extra in the Dockerfile)
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: callforge
      POSTGRES_PASSWORD: callforge
      POSTGRES_DB: callforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
